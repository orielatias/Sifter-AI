name: Daily AI Intelligence Pipeline

on:
  schedule:
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
      DIGEST_TO_EMAILS: ${{ secrets.DIGEST_TO_EMAILS }}
      ENVIRONMENT: production
      LOG_LEVEL: INFO

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pydantic pydantic-settings python-dotenv structlog httpx \
            "sqlalchemy[asyncio]" asyncpg qdrant-client anthropic \
            feedparser beautifulsoup4 jinja2 resend

      - name: Debug connection string
        run: |
          python -c "
          import os
          url = os.environ.get('SUPABASE_DB_URL', 'NOT SET')
          print(f'URL length: {len(url)}')
          print(f'Starts with: {url[:25]}...')
          print(f'Contains asyncpg: {\"asyncpg\" in url}')
          print(f'Contains @: {\"@\" in url}')
          print(f'Port segment: ...{url.split(\"@\")[-1][:50] if \"@\" in url else \"no @\"}')
          "

      - name: Run Hacker News ingestion
        run: python scripts/run_hackernews.py --max-stories 100

      - name: Run RSS ingestion
        run: python scripts/run_rss.py

      - name: Run AI analysis pipeline
        run: python scripts/run_analysis.py --batch-size 200

      - name: Generate and send digest
        run: python scripts/run_digest.py --period-days 1 --top-n 10

      - name: Pipeline complete
        run: echo "Daily pipeline complete at $(date -u)"