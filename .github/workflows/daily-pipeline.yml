name: Daily AI Intelligence Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pydantic pydantic-settings python-dotenv structlog httpx \
            "sqlalchemy[asyncio]" asyncpg qdrant-client anthropic \
            feedparser beautifulsoup4 jinja2 resend

      - name: Create .env from secrets
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          DIGEST_TO_EMAILS: ${{ secrets.DIGEST_TO_EMAILS }}
        run: |
          python -c "
          import os
          keys = ['SUPABASE_DB_URL','QDRANT_URL','QDRANT_API_KEY','ANTHROPIC_API_KEY','RESEND_API_KEY','DIGEST_FROM_EMAIL','DIGEST_TO_EMAILS']
          with open('.env','w') as f:
              for k in keys:
                  v = os.environ.get(k,'')
                  f.write(f'{k}={v}\n')
          print('.env created')
          "
      - name: Debug env file
        run: |
          python -c "
          with open('.env') as f:
              for line in f:
                  key, _, val = line.strip().partition('=')
                  if 'URL' in key or 'KEY' in key:
                      print(f'{key}={val[:20]}...({len(val)} chars)')
                  else:
                      print(f'{key}={val}')
          "

      - name: Run Hacker News ingestion
        run: python scripts/run_hackernews.py --max-stories 100

      - name: Run RSS ingestion
        run: python scripts/run_rss.py

      - name: Run AI analysis pipeline
        run: python scripts/run_analysis.py --batch-size 200

      - name: Generate and send digest
        run: python scripts/run_digest.py --period-days 1 --top-n 10

      - name: Pipeline complete
        run: echo "Daily pipeline complete at $(date -u)"